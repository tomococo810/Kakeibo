<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>家計簿</title>
  <link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" fill="%23000"/><text x="90" y="118" font-size="96" text-anchor="middle" fill="%23fff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">¥</text></svg>'>
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --line: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px 16px 48px;
    }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    h1, h2, p {
      margin: 0;
      font-weight: 500;
    }

    .header {
      display: grid;
      gap: 12px;
      margin-bottom: 32px;
    }

    .title {
      font-size: clamp(28px, 5vw, 40px);
      letter-spacing: 0.04em;
    }

    .month-total {
      font-size: clamp(28px, 8vw, 56px);
      line-height: 1;
    }

    .section {
      margin-bottom: 40px;
    }

    .voice-button,
    .submit-button,
    .delete-button,
    input {
      width: 100%;
      border: 1px solid var(--fg);
      border-radius: 0;
      background: var(--bg);
      color: var(--fg);
      font: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

    .voice-button,
    .submit-button {
      min-height: 64px;
      padding: 16px 18px;
      font-size: 18px;
    }

    .voice-button {
      margin-bottom: 16px;
    }

    .voice-button.listening {
      background: var(--fg);
      color: var(--bg);
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: #d0d0d0;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    input {
      min-height: 56px;
      padding: 14px 16px;
      font-size: 16px;
    }

    .list-header {
      margin-bottom: 16px;
      font-size: 14px;
      color: #d0d0d0;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      display: grid;
      gap: 12px;
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .item-name {
      font-size: 18px;
      word-break: break-word;
    }

    .item-amount {
      flex-shrink: 0;
      font-size: 18px;
      white-space: nowrap;
    }

    .item-date {
      font-size: 14px;
      color: #d0d0d0;
    }

    .delete-button {
      width: auto;
      min-height: 44px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .empty {
      padding: 16px 0;
      border-top: 1px solid var(--line);
      color: #d0d0d0;
    }

    @media (min-width: 640px) {
      body {
        padding: 40px 24px 64px;
      }

      .form-grid {
        grid-template-columns: 1.2fr 1.8fr 1fr;
      }

      .submit-button {
        width: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1 class="title">家計簿</h1>
      <p id="month-total" class="month-total">今月 ¥0</p>
    </section>

    <section class="section">
      <button id="voice-button" class="voice-button" type="button">音声で入力する</button>
      <p id="voice-status" class="status">例: 4月23日 スタバ 1200円</p>

      <form id="entry-form" class="form">
        <div class="form-grid">
          <input id="date-input" name="date" type="date" required>
          <input id="item-input" name="item" type="text" placeholder="項目" autocomplete="off" required>
          <input id="amount-input" name="amount" type="number" placeholder="金額" inputmode="numeric" min="0" required>
        </div>
        <button class="submit-button" type="submit">登録</button>
      </form> 
      <button onclick="exportData()">データをバックアップ</button>
<input type="file" onchange="importData(event)">
    </section>

    <section class="section">
      <h2 class="list-header">一覧</h2>
      <div id="entry-list" class="list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "minimal-kakeibo-entries";
    const form = document.getElementById("entry-form");
    const dateInput = document.getElementById("date-input");
    const itemInput = document.getElementById("item-input");
    const amountInput = document.getElementById("amount-input");
    const voiceButton = document.getElementById("voice-button");
    const voiceStatus = document.getElementById("voice-status");
    const entryList = document.getElementById("entry-list");
    const monthTotal = document.getElementById("month-total");

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;
    let entries = loadEntries();

    dateInput.value = todayString();
    render();

    if (Recognition) {
      recognition = new Recognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onstart = () => {
        isListening = true;
        voiceButton.classList.add("listening");
        voiceButton.textContent = "聞き取り中...";
        voiceStatus.textContent = "話してください";
      };

      recognition.onend = () => {
        isListening = false;
        voiceButton.classList.remove("listening");
        voiceButton.textContent = "音声で入力する";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.trim();
        applySpeechResult(transcript);
      };

      recognition.onerror = (event) => {
        voiceStatus.textContent = event.error === "not-allowed"
          ? "マイクの許可が必要です"
          : "音声入力に失敗しました";
      };
    } else {
      voiceButton.disabled = true;
      voiceButton.textContent = "このブラウザは音声入力に未対応です";
      voiceStatus.textContent = "手入力は利用できます";
    }

    voiceButton.addEventListener("click", () => {
      if (!recognition) return;

      if (isListening) {
        recognition.stop();
        return;
      }

      recognition.start();
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const entry = {
        id: String(Date.now()),
        date: dateInput.value,
        item: itemInput.value.trim(),
        amount: Number(amountInput.value)
      };

      if (!entry.date || !entry.item || !Number.isFinite(entry.amount) || entry.amount < 0) {
        return;
      }

      entries.unshift(entry);
      saveEntries();
      render();
      form.reset();
      dateInput.value = todayString();
      itemInput.focus();
      voiceStatus.textContent = "登録しました";
    });

    function loadEntries() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        const parsed = stored ? JSON.parse(stored) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function render() {
      renderMonthTotal();
      renderEntries();
    }

    function renderMonthTotal() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const total = entries
        .filter((entry) => {
          const entryDate = new Date(entry.date + "T00:00:00");
          return entryDate.getFullYear() === year && entryDate.getMonth() === month;
        })
        .reduce((sum, entry) => sum + Number(entry.amount || 0), 0);

      monthTotal.textContent = "今月 " + formatYen(total);
    }

    function renderEntries() {
      if (entries.length === 0) {
        entryList.innerHTML = '<div class="empty">まだ登録はありません</div>';
        return;
      }

      const sorted = [...entries].sort((a, b) => {
        const dateDiff = new Date(b.date) - new Date(a.date);
        if (dateDiff !== 0) return dateDiff;
        return Number(b.id) - Number(a.id);
      });

      entryList.innerHTML = "";

      sorted.forEach((entry) => {
        const row = document.createElement("article");
        row.className = "item";
        row.innerHTML = `
          <div class="item-top">
            <div>
              <div class="item-name"></div>
              <div class="item-date"></div>
            </div>
            <div class="item-amount"></div>
          </div>
          <button class="delete-button" type="button">削除</button>
        `;

        row.querySelector(".item-name").textContent = entry.item;
        row.querySelector(".item-date").textContent = formatDate(entry.date);
        row.querySelector(".item-amount").textContent = formatYen(entry.amount);
        row.querySelector(".delete-button").addEventListener("click", () => {
          entries = entries.filter((item) => item.id !== entry.id);
          saveEntries();
          render();
        });

        entryList.appendChild(row);
      });
    }

    function applySpeechResult(transcript) {
      const parsed = parseSpeech(transcript);

      if (parsed.date) dateInput.value = parsed.date;
      if (parsed.item) itemInput.value = parsed.item;
      if (parsed.amount) amountInput.value = parsed.amount;

      voiceStatus.textContent = "認識: " + transcript;
    }

    function parseSpeech(text) {
      const normalized = text.replace(/\s+/g, " ").trim();
      const today = new Date();
      let working = normalized;
      let date = "";
      let amount = "";

      const fullDateMatch = working.match(/(?:(\d{4})年)?\s*(\d{1,2})月\s*(\d{1,2})日/);
      if (fullDateMatch) {
        const year = fullDateMatch[1] ? Number(fullDateMatch[1]) : today.getFullYear();
        const month = Number(fullDateMatch[2]);
        const day = Number(fullDateMatch[3]);
        date = toDateString(year, month, day);
        working = working.replace(fullDateMatch[0], " ").trim();
      }

      const amountMatch = working.match(/(\d[\d,]*)\s*円?/);
      if (amountMatch) {
        amount = amountMatch[1].replace(/,/g, "");
        working = working.replace(amountMatch[0], " ").trim();
      }

      const item = working.replace(/\s+/g, " ").trim();

      return {
        date,
        item,
        amount
      };
    }

    function formatYen(value) {
      return "¥" + Number(value || 0).toLocaleString("ja-JP");
    }

    function formatDate(value) {
      const date = new Date(value + "T00:00:00");
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return month + "月" + day + "日";
    }

    function todayString() {
      const now = new Date();
      return toDateString(now.getFullYear(), now.getMonth() + 1, now.getDate());
    }

    function toDateString(year, month, day) {
      return [
        String(year).padStart(4, "0"),
        String(month).padStart(2, "0"),
        String(day).padStart(2, "0")
      ].join("-");
    }
  </script>
</body>
</html>
